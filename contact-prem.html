<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FeedManthan</title>
    <!-- Placeholder Favicon -->
    <link rel="icon" type="image/x-icon" href="https://via.placeholder.com/32x32.png?text=FM">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], },
                    colors: { primary: '#0B5ED7', secondary: '#FF6A00', }
                }
            }
        }
    </script>
    <style>
        .form-card input, .form-card select, .form-card textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }
        .form-card input:focus, .form-card select:focus, .form-card textarea:focus {
            outline: none;
            border-color: #0B5ED7;
            box-shadow: 0 0 0 3px rgba(11, 94, 215, 0.1);
            background-color: #ffffff;
        }
        .form-card label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #334155;
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="font-sans bg-slate-50 text-slate-800 antialiased h-screen flex flex-col">

    <!-- Navbar Minimal -->
    <nav class="w-full bg-white shadow-sm py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <span class="font-bold text-2xl text-primary tracking-tight"><i class="fas fa-arrow-left mr-2"></i> Feed<span class="text-secondary">Manthan</span></span>
            </a>
            <a href="index.html" class="text-slate-500 hover:text-primary font-medium">Back to Home</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6">
        <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
            
            <!-- Left Info Panel -->
            <div class="w-full md:w-1/3 bg-gradient-to-br from-primary to-blue-800 p-8 text-white flex flex-col justify-between">
                <div>
                    <h2 class="text-3xl font-bold mb-2">Get In Touch</h2>
                    <p class="text-blue-100 text-sm mb-8 opacity-90">Fill up the form and our Team will get back to you within 24 hours.</p>
                    
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center shrink-0">
                                <i class="fas fa-phone"></i>
                            </div>
                            <span class="text-sm">+91 7780020613</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center shrink-0">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <span class="text-sm">contactalertnetwork@gmail.com</span>
                        </div>
                        <div class="flex flex-start gap-4">
                            <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center shrink-0 mt-1">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <span class="text-sm leading-relaxed">R-Block, Patna, Bihar, 800001</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex gap-4 mt-12">
                    <a href="#" class="w-8 h-8 rounded-full bg-white/10 hover:bg-white hover:text-primary flex items-center justify-center transition-colors"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="w-8 h-8 rounded-full bg-white/10 hover:bg-white hover:text-primary flex items-center justify-center transition-colors"><i class="fab fa-instagram"></i></a>
                </div>
            </div>

            <!-- Right Form Panel -->
            <div class="w-full md:w-2/3 p-8 md:p-12">
                <h3 class="text-2xl font-bold text-slate-800 mb-6">Send a Message</h3>
                
                <div class="form-card" id="main-form">
                    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

                    <!-- GOOGLE FORM INTEGRATION (Provided by User) -->
                    <form action="https://docs.google.com/forms/u/0/d/e/YOUR_FORM_ID/formResponse" 
                          method="post" 
                          target="hidden_iframe" 
                          onsubmit="submitted=true;"
                          class="space-y-6">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="field">
                                <label>Full Name</label>
                                <input type="text" name="entry.1111111" placeholder="Enter full name" required>
                            </div>

                            <div class="field">
                                <label>Phone Number</label>
                                <input type="tel" name="entry.2222222" placeholder="10 Digit Number" required>
                            </div>

                            <div class="field">
                                <label>Email Address</label>
                                <input type="email" name="entry.3333333" placeholder="example@mail.com" required>
                            </div>

                            <div class="field">
                                <label>Designation</label>
                                <select name="entry.4444444" required>
                                    <option value="" disabled selected>Select level</option>
                                    <option value="Mukhiya">Mukhiya</option>
                                    <option value="Zila Parishad">Zila Parishad</option>
                                    <option value="Panchyat Samiti">Panchyat Samiti</option>
                                    <option value="Ward Member">Ward Member</option>
                                </select>
                            </div>

                            <div class="field">
                                <label>Panchayat</label>
                                <input type="text" name="entry.5555555" placeholder="Panchayat Name" required>
                            </div>

                            <div class="field">
                                <label>District</label>
                                <input type="text" name="entry.6666666" placeholder="District Name" required>
                            </div>

                            <div class="field">
                                <label>State</label>
                                <input type="text" name="entry.7777777" value="Bihar" required>
                            </div>

                            <div class="field">
                                <label>Pin Code</label>
                                <input type="text" name="entry.8888888" placeholder="000000" required>
                            </div>
                        </div>

                        <div class="field">
                            <label>Message / Campaign Details</label>
                            <textarea name="entry.9999999" rows="3" placeholder="Tell us about your election campaign..." required minlength="20"></textarea>
                        </div>

                        <button type="submit" class="w-full bg-secondary hover:bg-orange-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all hover:-translate-y-1 mt-4">
                            Submit Campaign Lead
                        </button>
                    </form>
                    
                    <div id="success-msg" class="hidden mt-6 p-4 bg-green-100 text-green-700 rounded-lg text-center font-medium">
                        <i class="fas fa-check-circle mr-2"></i> Your message has been sent successfully! Our team will contact you soon.
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        var submitted = false;
        function showSuccess() {
            document.getElementById('main-form').querySelector('form').style.display = 'none';
            document.getElementById('success-msg').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
